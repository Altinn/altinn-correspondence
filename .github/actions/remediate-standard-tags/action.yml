name: Remediate standard tags

description: "Run remediation for the correspondence standard tags policy"

inputs:
  AZURE_CLIENT_ID:
    description: "Client ID for the service principal"
    required: true
  AZURE_TENANT_ID:
    description: "Tenant ID for the service principal"
    required: true
  AZURE_SUBSCRIPTION_ID:
    description: "Subscription ID for the service principal"
    required: true
  AZURE_NAME_PREFIX:
    description: "Prefix for all resources (resource group name prefix)"
    required: true

runs:
  using: "composite"
  steps:
    - name: OIDC Login to Azure Public Cloud
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Remediate standard tags policy
      shell: bash
      run: |
        set -euo pipefail
        rg_name="${{ inputs.AZURE_NAME_PREFIX }}-rg"
        subscription_id="${{ inputs.AZURE_SUBSCRIPTION_ID }}"
        assignment_id="/subscriptions/${subscription_id}/resourceGroups/${rg_name}/providers/Microsoft.Authorization/policyAssignments/correspondence-standard-tags"
        az policy remediation create \
          --name "correspondence-standard-tags-remediation" \
          --policy-assignment "$assignment_id" \
          --resource-group "$rg_name"

    - name: Logout from azure
      shell: bash
      if: ${{failure() || success()}}
      continue-on-error: true
      run: az logout


