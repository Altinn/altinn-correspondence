name: Test Use Cases On Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: true
        default: 'use-case-test'
        type: choice
        options:
        - use-case-test
        - use-case-staging
        - use-case-production
      force_opsgenie_alert:
        description: 'Send Opsgenie alert even if tests pass (for testing the integration)'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: 'Environment to run against'
        required: true
        type: string
      force_opsgenie_alert:
        description: 'Send Opsgenie alert even if tests pass (for testing the integration)'
        required: false
        default: false
        type: boolean

run-name: Test use cases for environment ${{ inputs.environment || github.event.inputs.environment || 'use-case-test' }}

jobs:
  usecase-test:
    environment: ${{ inputs.environment || github.event.inputs.environment || 'use-case-test' }}
    runs-on: ubuntu-latest
    env:
      OPSGENIE_API_KEY: ${{ secrets.OPSGENIE_API_KEY }}
    outputs:
      tests-enabled: ${{ steps.check-enable.outputs.enabled }}
    steps:
    - name: Check if use case tests are enabled
      id: check-enable
      run: |
        if [ "${{ secrets.ENABLE_USE_CASE_TESTS }}" == "true" ]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "Use case tests are enabled"
        else
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Use case tests are disabled. Set ENABLE_USE_CASE_TESTS secret to 'true' to enable."
        fi
    
    - name: Checkout
      if: steps.check-enable.outputs.enabled == 'true'
      uses: actions/checkout@v7

    - name: Run use case test (case_initialize_correspondence.js)
      id: usecase-test
      if: steps.check-enable.outputs.enabled == 'true'
      uses: grafana/k6-action@e4714b734f2b0afaabeb7b4a69142745548ab9ec # v0.3.1
      env:
        base_url: ${{ secrets.CORRESPONDENCE_BASE_URL }}
        mp_client_id: ${{ secrets.BRUKSMONSTER_MASKINPORTEN_CLIENT_ID }}
        mp_kid: ${{ secrets.BRUKSMONSTER_MASKINPORTEN_KID }}
        mp_client_pem: ${{ secrets.BRUKSMONSTER_MASKINPORTEN_PEM }}
        recipient: ${{ secrets.BRUKSMONSTER_RECIPIENT }}
      with:
        filename: Test/Altinn.Correspondence.UseCaseTests/case_initialize_correspondence.js

    - name: Build failure report
      if: failure() && steps.check-enable.outputs.enabled == 'true' && steps.usecase-test.outcome == 'failure'
      run: |
          report=":warning: Correspondence use case test failure :warning: \n"
          report+="\n Environment: ${{ inputs.environment || github.event.inputs.environment || 'use-case-test' }}"
          report+="\n Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "stepreport=$report" >> $GITHUB_ENV
    - name: Report failure to Slack
      if: failure() && steps.check-enable.outputs.enabled == 'true' && steps.usecase-test.outcome == 'failure'
      id: slack
      uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
      with:
        webhook-type: incoming-webhook
        webhook: ${{ secrets.BRUKSMONSTER_SLACK_URL || secrets.SLACK_URL }}
        payload: |
          {
            "text": "${{ env.stepreport }}"
          }

    - name: Checkout for Opsgenie reporting
      if: always() && env.OPSGENIE_API_KEY != '' && ((steps.check-enable.outputs.enabled == 'true' && steps.usecase-test.outcome != 'skipped' && steps.usecase-test.outcome == 'failure') || inputs.force_opsgenie_alert == true || github.event.inputs.force_opsgenie_alert == 'true')
      uses: actions/checkout@v7

    - name: Report failure to Opsgenie
      if: always() && env.OPSGENIE_API_KEY != '' && ((steps.check-enable.outputs.enabled == 'true' && steps.usecase-test.outcome != 'skipped' && steps.usecase-test.outcome == 'failure') || inputs.force_opsgenie_alert == true || github.event.inputs.force_opsgenie_alert == 'true')
      env:
        OPSGENIE_API_URL: https://api.eu.opsgenie.com
        USE_CASE_ENV: ${{ inputs.environment || github.event.inputs.environment || 'use-case-test' }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        FORCE_ALERT: ${{ inputs.force_opsgenie_alert == true || github.event.inputs.force_opsgenie_alert == 'true' }}
      run: |
        set -euo pipefail

        node .github/scripts/build-opsgenie-use-case-alert.js > payload.json
        echo "Opsgenie payload size: $(wc -c < payload.json) bytes"

        API_KEY="$(printf '%s' "${OPSGENIE_API_KEY}" | tr -d '[:space:]')"
        if [ -z "${API_KEY}" ]; then
          echo "OPSGENIE_API_KEY is empty after trimming whitespace"
          exit 1
        fi

        REQUEST_URL="${OPSGENIE_API_URL}/v1/json/azure?apiKey=${API_KEY}"

        curl --fail-with-body -v --show-error --silent \
          --request POST \
          --url "${REQUEST_URL}" \
          --header "Content-Type: application/json" \
          --data-binary @payload.json